<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TorrentHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #e8e4e0; 
            color: #333; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .login-box { 
            background: #fff; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            width: 420px; 
            max-width: 90%;
        }
        .login-box h2 { 
            color: #ff6b00; 
            margin-bottom: 25px; 
            text-align: center; 
            font-size: 28px;
        }
        .tab-switch { 
            display: flex; 
            margin-bottom: 25px; 
            border-bottom: 2px solid #eee;
        }
        .tab-switch button { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            background: none; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600; 
            color: #666;
        }
        .tab-switch button.active { 
            color: #ff6b00; 
            border-bottom: 3px solid #ff6b00; 
            margin-bottom: -2px;
        }
        .form-section { 
            display: none;
        }
        .form-section.active { 
            display: block;
        }
        .input-group { 
            margin-bottom: 18px;
        }
        .input-group label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            font-size: 14px; 
            color: #555;
        }
        .input-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            font-size: 14px;
        }
        .input-group input:focus { 
            border-color: #ff6b00; 
            outline: none;
        }
        .checkbox-row { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 20px; 
            font-size: 14px; 
            color: #555;
        }
        .checkbox-row input { 
            width: 18px; 
            height: 18px; 
            cursor: pointer;
        }
        .btn-primary { 
            width: 100%; 
            padding: 14px; 
            background: #ff6b00; 
            color: #fff; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 16px; 
            margin-bottom: 15px;
        }
        .btn-primary:hover { 
            background: #e55f00;
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .divider { 
            text-align: center; 
            margin: 20px 0; 
            color: #999; 
            font-size: 14px;
        }
        .social-login { 
            display: flex; 
            gap: 10px;
        }
        .social-login button { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #ddd; 
            background: #fff; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 14px;
        }
        .google-btn { 
            border-color: #db4437; 
            color: #db4437;
        }
        .github-btn { 
            border-color: #333; 
            color: #333;
        }
        .links { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 14px;
        }
        .links a { 
            color: #ff6b00; 
            text-decoration: none;
        }
        .back-link { 
            text-align: center; 
            margin-top: 20px;
        }
        .back-link a { 
            color: #666; 
            text-decoration: none; 
            font-size: 14px;
        }
        .twofa-box { 
            background: #d4edda; 
            border: 1px solid #28a745; 
            color: #155724; 
            padding: 15px; 
            border-radius: 4px; 
            margin-bottom: 20px; 
            font-size: 13px; 
            display: none;
        }
        .twofa-box.active { 
            display: block;
        }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .error-msg.active {
            display: block;
        }
        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .success-msg.active {
            display: block;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🔥 TorrentHub</h2>
        
        <div class="tab-switch">
            <button class="active" onclick="switchTab('login')">Log In</button>
            <button onclick="switchTab('register')">Register</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <!-- LOGIN SECTION -->
        <div class="form-section active" id="loginSection">
            <div class="input-group">
                <label>Username or Email</label>
                <input type="text" id="loginUsername" placeholder="Enter username or email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            
            <div class="checkbox-row">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe" style="margin:0; font-weight:400;">Remember me on this device</label>
            </div>
            
            <button class="btn-primary" onclick="login()" id="loginBtn">Log In</button>
            
            <div class="links">
                <a href="#" onclick="switchTab('forgot')">Forgot password?</a>
            </div>
            
            <div class="divider">or</div>
            
            <div class="social-login">
                <button class="google-btn">🔴 Google</button>
                <button class="github-btn">⚫ GitHub</button>
            </div>
        </div>

        <!-- REGISTER SECTION -->
        <div class="form-section" id="registerSection">
            <div class="input-group">
                <label>Username *</label>
                <input type="text" id="regUsername" placeholder="Your login name (a-z, 0-9, _ )">
            </div>
            <div class="input-group">
                <label>Nickname *</label>
                <input type="text" id="regNickname" placeholder="Display name shown on site">
            </div>
            <div class="input-group">
                <label>Email *</label>
                <input type="email" id="regEmail" placeholder="your@email.com">
            </div>
            <div class="input-group">
                <label>Password *</label>
                <input type="password" id="regPassword" placeholder="Min 8 characters">
            </div>
            <div class="input-group">
                <label>Confirm Password *</label>
                <input type="password" id="regConfirm" placeholder="Repeat password">
            </div>
            
            <div class="checkbox-row">
                <input type="checkbox" id="enable2FA">
                <label for="enable2FA" style="margin:0; font-weight:400;">Enable 2-Step Verification (Email)</label>
            </div>
            
            <div class="twofa-box" id="2faInfo">
                <strong>📧 2FA Enabled!</strong><br>
                You'll receive a 6-digit code via email every time you log in.
            </div>
            
            <button class="btn-primary" onclick="register()" id="regBtn">Create Account</button>
            
            <div class="divider">or</div>
            
            <div class="social-login">
                <button class="google-btn">🔴 Sign up with Google</button>
                <button class="github-btn">⚫ Sign up with GitHub</button>
            </div>
        </div>

        <!-- FORGOT PASSWORD SECTION -->
        <div class="form-section" id="forgotSection">
            <p style="margin-bottom: 20px; color: #666;">Enter your email and we'll send you a reset link.</p>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="your@email.com">
            </div>
            <button class="btn-primary">Send Reset Link</button>
            <div class="links">
                <a href="#" onclick="switchTab('login')">← Back to login</a>
            </div>
        </div>

        <div class="back-link">
            <a href="index.html">← Back to TorrentHub</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://torrenthub-api.serafimkoragin-b12.workers.dev';

        function switchTab(tab) {
            document.querySelectorAll('.tab-switch button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.getElementById('errorMsg').classList.remove('active');
            document.getElementById('successMsg').classList.remove('active');
            
            if(tab === 'login') {
                document.querySelectorAll('.tab-switch button')[0].classList.add('active');
                document.getElementById('loginSection').classList.add('active');
            } else if(tab === 'register') {
                document.querySelectorAll('.tab-switch button')[1].classList.add('active');
                document.getElementById('registerSection').classList.add('active');
            } else if(tab === 'forgot') {
                document.querySelectorAll('.tab-switch button')[0].classList.remove('active');
                document.querySelectorAll('.tab-switch button')[1].classList.remove('active');
                document.getElementById('forgotSection').classList.add('active');
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('active');
            document.getElementById('successMsg').classList.remove('active');
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.add('active');
            document.getElementById('errorMsg').classList.remove('active');
        }

        async function register() {
            const btn = document.getElementById('regBtn');
            btn.disabled = true;
            btn.textContent = 'Creating...';

            const username = document.getElementById('regUsername').value;
            const nickname = document.getElementById('regNickname').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const enable2FA = document.getElementById('enable2FA').checked;

            if (!username || !nickname || !email || !password) {
                showError('All fields are required');
                btn.disabled = false;
                btn.textContent = 'Create Account';
                return;
            }

            if (password !== confirm) {
                showError('Passwords do not match');
                btn.disabled = false;
                btn.textContent = 'Create Account';
                return;
            }

            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                btn.disabled = false;
                btn.textContent = 'Create Account';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, nickname, email, password, enable2FA })
                });

                const data = await res.json();

                if (data.success) {
                    showSuccess('Account created! You can now log in.');
                    setTimeout(() => switchTab('login'), 2000);
                } else {
                    showError(data.error || 'Registration failed');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            }

            btn.disabled = false;
            btn.textContent = 'Create Account';
        }

        async function login() {
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!username || !password) {
                showError('Please enter username and password');
                btn.disabled = false;
                btn.textContent = 'Log In';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, rememberMe })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('torrenthub_token', data.token);
                    localStorage.setItem('torrenthub_user', JSON.stringify(data.user));
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            }

            btn.disabled = false;
            btn.textContent = 'Log In';
        }

        document.getElementById('enable2FA')?.addEventListener('change', function() {
            document.getElementById('2faInfo').classList.toggle('active', this.checked);
        });
    </script>

</body>
</html>
